# Example server.yml — `ac config` writes one of these for you, but you can also
# hand-edit it. car/track ids are the folder names under
# ...\assettocorsa\content\cars  and  ...\content\tracks.

name: "Friday Night Practice"
backend: assettoserver      # assettoserver | acserver
password: ""                # blank = public
admin_password: "change-me" # use /admin <pass> in chat

track:
  id: ks_nordschleife
  layout: endurance         # "" if the track has no separate layouts

cars:
  - id: ks_porsche_911_gt3_r_2016
    count: 12               # grid slots for this car
    # skins (= car colors/liveries). [] lets each player pick their own color.
    # To assign specific liveries, list skin folder names — run
    #   ac skins ks_porsche_911_gt3_r_2016   to see what's available.
    skins: []
  - id: ks_ferrari_488_gt3
    count: 12

sessions:
  practice:
    enabled: true
    name: Practice
    time: 0                 # minutes, 0 = unlimited
    is_open: true           # join anytime ("open practice")
  qualify:
    enabled: false
    name: Qualify
    time: 15
    is_open: true
  race:
    enabled: false
    name: Race
    laps: 10
    time: 0                 # 0 = use laps; >0 = timed race
    wait_time: 60           # seconds on the grid before green
    is_open: true
  booking:                  # vanilla acServer only
    enabled: false

# Race rules / realism — all optional; the defaults shown apply if omitted.
rules:
  damage: 100              # DAMAGE_MULTIPLIER 0-100  (0 = damage OFF)
  fuel_rate: 100           # fuel / "gas" consumption %  (50 = half, 0 = none)
  tyre_wear: 100           # tyre wear %  (0 = no wear)
  tyre_blankets: false     # tyre warmers — true = start on hot tyres
  legal_tyres: []          # allowed compounds, e.g. ["SM","SH"]; [] = all allowed
  tyres_out: 2             # cut penalty after this many tyres off track (-1 = off)
  abs: factory             # off | factory (as car allows) | on (forced)
  traction_control: factory  # off | factory | on
  stability_control: 0     # stability-assist % allowed (0 = off)
  autoclutch: true         # allow auto-clutch
  force_virtual_mirror: true

# Optional weather (sensible default applied if omitted)
# weather: { graphics: "3_clear", ambient: 18, road_offset: 6 }
